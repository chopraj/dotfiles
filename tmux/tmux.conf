unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g history-limit 50000
set -g mouse on
set -g set-titles on
set -g set-titles-string '#S:#W'
set -a terminal-features "tmux-256color:RGB"
set -ga terminal-overrides ',xterm*:smcup@:rmcup@'
set -g status-position top
set -g status-justify absolute-centre
set -g status-interval 5
set -g status-style "bg=default,fg=colour252"
set -g status-left-length 20
set -g status-left "#[fg=colour252] #S #[default]"
set -g status-right ""
set -g window-status-separator "  "
set -g window-status-style "bg=default,fg=colour245"
set -g window-status-current-style "bg=default,fg=#c4b5fd,bold"
set -g window-status-activity-style "bg=default,fg=colour250"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
set -g message-style "bg=default,fg=#c4b5fd"
set -g mode-style "bg=#c4b5fd,fg=black,bold"

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key { previous-window
bind-key } next-window
